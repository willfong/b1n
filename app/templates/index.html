{% extends 'layout.html' %}

{% block content %}
<div>
    <form action="{{url_for('index.view')}}" method="post">
        <div class="input-group mb-3">
            <input type="tel" class="form-control" placeholder="Access Code" aria-label="Access Code" aria-describedby="Access Code" name="access_code" autofocus>
            <div class="input-group-append">
              <button class="btn btn-outline-primary" type="submit" id="button-addon2">View</button>
            </div>
        </div>
    </form>
</div>
<hr />
<div>
    <form action="{{url_for('index.new')}}" method="post">
        <div class="form-group">
            <label for="content">New Bin</label>
            <textarea class="form-control" id="content" rows="3" name="content">{{content}}</textarea>
        </div>
        <div class="form-group row">
            <div class="col-sm-10">
                <button type="submit" class="btn btn-primary">Create</button>
            </div>
        </div>
    </form>
</div>
{% endblock %}
